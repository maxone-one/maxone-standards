# Project Registry — Single Source of Truth über alle Projekte
#
# Wird von scripts/audit.mjs gelesen, um Compliance-Status pro Projekt zu
# berichten. Bei jedem neuen Projekt: Eintrag hier hinzufügen.
#
# Felder:
#   name           — Projekt-Slug (für Audit-Output)
#   workspace      — Datei-Name des .code-workspace (ohne Endung)
#   domain         — Live-Domain (oder null)
#   server         — Hostname oder null
#   deploy         — blue-green | single | null
#   container      — Container-Name (Audit prüft <container>-blue/-green bei blue-green)
#   path_local     — lokaler Repo-Pfad
#   path_server    — Server-Pfad (oder null)
#   compose_file   — Name der Prod-Compose-Datei (default: docker-compose.yml)
#   secrets_dir    — Ordnername in /opt/secrets/ (default: name; oft verschieden!)
#   status         — live | dev | paused | sunset-pending | sunset
#   tags           — Liste
#   external_subscriptions  — (optional, Standard 026) Liste von Drittanbieter-
#                             Abos. Jeder Eintrag: { service, reason, cost_per_month_eur,
#                             sunset_plan }. Erlaubte reason-Werte: payment-processor,
#                             domain-registrar, tls-ca, vps-hosting. Andere → WARN.
#                             Komplett fehlend → WARN.
#   deploy_pipeline         — (optional, Standard 027) "manual" für Projekte ohne
#                             GitHub-Actions-Pipeline (interne Tools). Default = audit
#                             erwartet .github/workflows/deploy.yml.
#   last_review_date        — (Pflicht für status: live, Standard 021) YYYY-MM-DD,
#                             Datum des letzten Gate-3-(Re-)Reviews. Audit warnt bei
#                             > 180 Tagen, fail bei > 270 Tagen.
#   review_postponed_to     — (optional, Standard 021) YYYY-MM-DD, Verschiebung des
#                             nächsten Re-Reviews (max. +30 Tage), mit Begründung im
#                             Kommentar.
#   warmup_required         — (optional, Standard 033) `false` markiert Projekte, die
#                             keinen Post-Deploy-Warm-Up brauchen (Static SPAs ohne SSR,
#                             pure-API-Container ohne User-Frontend). Default = audit
#                             erwartet Warm-Up-Pattern in deploy.sh.
#   version_endpoint        — (optional, Standard 042) Pfad des Version-Endpoints.
#                             Default: /api/version. Static-SPA-Projekte ohne Server:
#                             /version.json (wird beim Build erzeugt).
#   data_processors         — (optional, Standard 041; Pflicht vor Live-Gang bei
#                             personenbezogenen Daten) Liste externer Auftragsverarbeiter
#                             (Richtung 1: Max ist Verantwortlicher, Dienst ist Processor).
#                             Jeder Eintrag: { service, purpose, personal_data, region,
#                             avv_status, evidence, reviewed_at, subprocessors,
#                             transfer_basis }. Erlaubte avv_status-Werte:
#                             signed | account-enabled | standard-terms | not-required |
#                             missing | unknown.
#   outbound_avv            — (optional, Standard 041; Pflicht bei tags: customer)
#                             AVVs, die Max als Auftragsverarbeiter an Kunden ausstellt
#                             (Richtung 2: Kunde ist Verantwortlicher, Max ist Processor).
#                             Jeder Eintrag: { client, contact, avv_status, evidence,
#                             reviewed_at, notes }. Erlaubte avv_status-Werte:
#                             signed | sent | missing | not-required.

