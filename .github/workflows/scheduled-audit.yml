name: Scheduled Audit

# Standard 031 — Routine-Platform: Heartbeat statt User-NUC.
# Runs on `voltfair-server` (self-hosted Org-Runner auf maxone-prod, hat
# SSH-Keys zu allen 4 Servern). Ersetzt die ursprünglichen Optionen
# A/B/C/D aus HANDOFF.md (alle vier waren NUC-/IDE-/Sitzungs-abhängig).

on:
  schedule:
    # 2026-05-11 10:00 Europe/Berlin = 08:00 UTC (DST aktiv).
    # Plus monatlich am 11. um 08:00 UTC als Drift-Schutz für Standard 021.
    - cron: '0 8 11 * *'
  workflow_dispatch:
    inputs:
      emit_issues:
        description: 'Auch GH-Issues erzeugen?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  audit:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 20
    permissions:
      contents: write  # noetig fuer commit-back von audits/ (siehe Step "Commit audit results")
    steps:
      - uses: actions/checkout@v4
        with:
          # Vollstaendige History fuer push-back. fetch-depth=0 ist kein
          # Performance-Problem (Repo ist klein, < 5 MB).
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect Node
        run: node --version

      - name: Install deps
        run: npm ci --omit=dev --no-audit --no-fund

      - name: Run audit
        id: audit
        run: |
          set +e
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p audits
          # --root=/opt schaltet path_local-Lookup auf server-residente
          # Projekt-Verzeichnisse um (siehe Migration in HANDOFF.md).
          node scripts/audit.mjs --root=/opt > "audits/audit-${DATE}.txt" 2>&1
          AUDIT_EXIT=$?
          echo "exit=${AUDIT_EXIT}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          # Audit-Findings sind kein Fehler; ein Skript-Crash schon.
          # Heuristik: Output enthaelt keinen Summary-Block -> Crash.
          if ! grep -q '^--- Summary ---' "audits/audit-${DATE}.txt"; then
            echo "::error::audit.mjs lieferte keinen Summary-Block (vermutlich Crash). Exit ${AUDIT_EXIT}."
            tail -30 "audits/audit-${DATE}.txt"
            exit 1
          fi

      - name: Emit GH-Issue payloads
        if: ${{ inputs.emit_issues != 'false' }}
        run: node scripts/audit.mjs --root=/opt --emit=issues || true

      # Commit-back statt actions/upload-artifact: Org-Artifact-Quota ist
      # geteilt mit allen anderen Repos und kann ueberlaufen (passiert am
      # 2026-04-28). Audit-Output ist Plain-Text (~15 KB) und gehoert
      # logisch in audits/ neben der Baseline. Diff via `git log audits/`
      # ist staerker als Artifact-Download.
      - name: Commit audit results
        run: |
          set -e
          DATE="${{ steps.audit.outputs.date }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "audits/audit-${DATE}.txt"
          # issues-*.{json,md} nur committen wenn emit_issues=true (sonst leere Add)
          [ "${{ inputs.emit_issues }}" != "false" ] && git add "audits/issues-${DATE}.json" "audits/issues-${DATE}.md" 2>/dev/null || true
          git diff --cached --quiet && { echo "Keine Aenderungen."; exit 0; }
          git commit -m "audit: scheduled run ${DATE}" -m "Triggered by ${GITHUB_EVENT_NAME} on ${GITHUB_SHA:0:7}."
          git push origin HEAD:main
